<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#1c1f3a"/>
    </linearGradient>
    <linearGradient id="battGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="80" cy="80" r="75" fill="url(#bgB)" opacity="0.9"/>
  <!-- Battery body -->
  <rect x="38" y="52" width="76" height="52" rx="8" fill="url(#battGrad)"/>
  <!-- Battery tip -->
  <rect x="114" y="66" width="10" height="24" rx="4" fill="#8b5cf6"/>
  <!-- Battery charge segments -->
  <rect x="46" y="60" width="14" height="36" rx="4" fill="#c4b5fd" opacity="0.9"/>
  <rect x="64" y="60" width="14" height="36" rx="4" fill="#c4b5fd" opacity="0.7"/>
  <rect x="82" y="60" width="14" height="36" rx="4" fill="#c4b5fd" opacity="0.3"/>
  <!-- Lightning bolt -->
  <path d="M88 48 L72 82 L82 82 L72 112 L96 74 L84 74 Z" fill="url(#boltGrad)" filter="url(#glowB)"/>
  <!-- Glow aura behind bolt -->
  <path d="M88 48 L72 82 L82 82 L72 112 L96 74 L84 74 Z" fill="#fbbf24" opacity="0.2" filter="url(#glowB)"/>
</svg>
