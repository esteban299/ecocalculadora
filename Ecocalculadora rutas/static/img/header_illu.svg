<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="islandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glowAlpha">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Glow de fondo -->
  <circle cx="200" cy="200" r="150" fill="url(#sunGrad)" opacity="0.4" filter="url(#glowAlpha)"/>
  
  <!-- Isla Base (Glassmorphism) -->
  <path d="M100 220 C100 180 300 180 300 220 C300 260 250 280 200 280 C150 280 100 260 100 220Z" fill="url(#islandGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <path d="M110 215 C110 190 290 190 290 215" stroke="rgba(74,222,128,0.3)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Árboles Estilizados -->
  <g transform="translate(150, 160)">
    <rect x="8" y="30" width="4" height="20" fill="#334155"/>
    <circle cx="10" cy="25" r="15" fill="#16a34a" opacity="0.8"/>
  </g>
  <g transform="translate(210, 175)">
    <rect x="8" y="25" width="4" height="15" fill="#334155"/>
    <circle cx="10" cy="20" r="12" fill="#22c55e" opacity="0.9"/>
  </g>

  <!-- Orbes de Energía Flotantes -->
  <circle cx="200" cy="180" r="8" fill="#4ade80" filter="url(#glowAlpha)">
    <animate attributeName="cy" values="180;160;180" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="250" cy="150" r="5" fill="#2dd4bf" filter="url(#glowAlpha)" opacity="0.6">
    <animate attributeName="cy" values="150;130;150" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="140" cy="140" r="6" fill="#fbbf24" filter="url(#glowAlpha)" opacity="0.5">
    <animate attributeName="cy" values="140;160;140" dur="6s" repeatCount="indefinite" />
  </circle>

  <!-- Anillos Tecnológicos -->
  <circle cx="200" cy="200" r="170" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="200" cy="200" r="120" stroke="white" stroke-opacity="0.1" stroke-width="0.5" stroke-dasharray="10 20">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite" />
  </circle>
</svg>
