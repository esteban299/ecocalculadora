<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#142a20"/>
    </linearGradient>
    <linearGradient id="roofGradL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="wallGradL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="glowL">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="80" cy="80" r="75" fill="url(#bgGradL)" opacity="0.9"/>
  
  <!-- Modern Mansion Sections -->
  <!-- Left Wing -->
  <rect x="25" y="85" width="40" height="50" rx="2" fill="url(#wallGradL)"/>
  <!-- Center Hub -->
  <rect x="60" y="65" width="45" height="70" rx="2" fill="url(#wallGradL)"/>
  <!-- Right Wing -->
  <rect x="100" y="85" width="40" height="50" rx="2" fill="url(#wallGradL)"/>
  
  <!-- Center Main Door -->
  <rect x="72" y="105" width="22" height="30" rx="3" fill="#0f172a"/>
  <circle cx="89" cy="120" r="1.5" fill="#4ade80"/>
  
  <!-- Modern Rows of Windows -->
  <!-- Left -->
  <rect x="30" y="95" width="12" height="10" rx="1" fill="#bae6fd" opacity="0.8"/>
  <rect x="48" y="95" width="12" height="10" rx="1" fill="#bae6fd" opacity="0.8"/>
  <rect x="30" y="115" width="30" height="10" rx="1" fill="#bae6fd" opacity="0.8"/>
  
  <!-- Right -->
  <rect x="105" y="95" width="30" height="10" rx="1" fill="#bae6fd" opacity="0.8"/>
  <rect x="105" y="115" width="12" height="10" rx="1" fill="#bae6fd" opacity="0.8"/>
  <rect x="123" y="115" width="12" height="10" rx="1" fill="#bae6fd" opacity="0.8"/>
  
  <!-- Center Tower Windows -->
  <rect x="65" y="75" width="34" height="8" rx="1" fill="#bae6fd" opacity="0.8"/>
  <rect x="65" y="90" width="34" height="8" rx="1" fill="#bae6fd" opacity="0.8"/>
  
  <!-- Rooftop Garden/Eco Roofs -->
  <rect x="22" y="82" width="46" height="6" rx="2" fill="url(#roofGradL)" filter="url(#glowL)"/>
  <rect x="97" y="82" width="46" height="6" rx="2" fill="url(#roofGradL)" filter="url(#glowL)"/>
  <rect x="58" y="62" width="49" height="6" rx="2" fill="url(#roofGradL)" filter="url(#glowL)"/>

  <!-- Multiple Solar Panels -->
  <g transform="translate(62, 45)" opacity="0.8">
    <rect x="0" y="0" width="18" height="10" rx="1" fill="#0284c7"/>
    <rect x="22" y="0" width="18" height="10" rx="1" fill="#0284c7"/>
  </g>
</svg>
