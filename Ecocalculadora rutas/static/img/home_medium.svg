<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradM" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#1a3a2a"/>
    </linearGradient>
    <linearGradient id="roofGradM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="wallGradM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="glowM">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="80" cy="80" r="75" fill="url(#bgGradM)" opacity="0.9"/>
  
  <!-- House wall (Medium - Two floors) -->
  <rect x="35" y="70" width="90" height="68" rx="4" fill="url(#wallGradM)"/>
  
  <!-- Door -->
  <rect x="68" y="102" width="24" height="36" rx="3" fill="#1e293b"/>
  <circle cx="88" cy="120" r="2" fill="#4ade80"/>
  
  <!-- Windows Floor 1 -->
  <rect x="45" y="105" width="16" height="14" rx="2" fill="#bae6fd" opacity="0.8"/>
  <rect x="99" y="105" width="16" height="14" rx="2" fill="#bae6fd" opacity="0.8"/>
  
  <!-- Windows Floor 2 -->
  <rect x="45" y="80" width="16" height="14" rx="2" fill="#bae6fd" opacity="0.8"/>
  <rect x="72" y="80" width="16" height="14" rx="2" fill="#bae6fd" opacity="0.8"/>
  <rect x="99" y="80" width="16" height="14" rx="2" fill="#bae6fd" opacity="0.8"/>
  
  <!-- Roof -->
  <polygon points="28,72 80,28 132,72" fill="url(#roofGradM)" filter="url(#glowM)"/>
  
  <!-- Chimney -->
  <rect x="102" y="38" width="10" height="20" rx="2" fill="#475569"/>
  
  <!-- Solar panels -->
  <rect x="58" y="50" width="18" height="12" rx="2" fill="#38bdf8" opacity="0.7"/>
  <rect x="84" y="50" width="18" height="12" rx="2" fill="#38bdf8" opacity="0.7"/>
</svg>
