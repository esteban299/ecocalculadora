<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="planetMed" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#451a03"/>
    </radialGradient>
    <radialGradient id="glowMed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="100" cy="100" r="90" fill="url(#glowMed)"/>
  <!-- Planet -->
  <circle cx="100" cy="100" r="70" fill="url(#planetMed)"/>
  <!-- Surface details -->
  <ellipse cx="90" cy="85" rx="18" ry="12" fill="#f59e0b" opacity="0.4" transform="rotate(-10 90 85)"/>
  <ellipse cx="118" cy="108" rx="15" ry="10" fill="#b45309" opacity="0.35" transform="rotate(20 118 108)"/>
  <ellipse cx="80" cy="115" rx="12" ry="8" fill="#f59e0b" opacity="0.3"/>
  <!-- Shine -->
  <ellipse cx="80" cy="74" rx="18" ry="12" fill="white" opacity="0.12" transform="rotate(-30 80 74)"/>
  <!-- Ring -->
  <ellipse cx="100" cy="100" rx="95" ry="24" stroke="#fbbf24" stroke-width="4" fill="none" opacity="0.5" transform="rotate(-20 100 100)"/>
  <!-- Stars -->
  <circle cx="28" cy="32" r="2" fill="white" opacity="0.5"/>
  <circle cx="162" cy="45" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="170" cy="155" r="2" fill="white" opacity="0.35"/>
  <circle cx="35" cy="168" r="1.5" fill="white" opacity="0.4"/>
  <!-- Dash (neutral) -->
  <line x1="86" y1="100" x2="114" y2="100" stroke="#fde68a" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
</svg>
